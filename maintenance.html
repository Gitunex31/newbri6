<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site en Maintenance</title>
    <style>
        body {
            background-color: #ffffff;
            color: #1a1a1a;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .content {
            text-align: center;
            max-width: 450px;
            padding: 40px;
            border: 1px solid #eeeeee;
        }

        .line {
            width: 50px;
            height: 2px;
            background-color: #1a1a1a;
            margin: 30px auto;
        }

        h1 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        p {
            font-size: 15px;
            line-height: 1.8;
            color: #666666;
            margin-bottom: 30px;
        }

        .status-code {
            font-size: 11px;
            color: #999999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Information</h1>
        <div class="line"></div>
        <p>
            L'accès à cette plateforme est momentanément suspendu. <br>
            Le site fait l'objet d'une vérification de ses paramètres d'hébergement et de ses droits de diffusion.
        </p>
        <div class="status-code">
            Référence d'erreur : 402-B-INIT
        </div>
    </div>
</body>
</html>

RewriteEngine On
RewriteCond %{REQUEST_URI} !/500\.html$
RewriteRule ^(.*)$ /500.html [L,R=302]
